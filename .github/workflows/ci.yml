name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: ragdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U raguser -d ragdb
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest httpx pytest-asyncio
      - run: |
          cat > .env << EOF
          DATABASE_URL=postgresql+asyncpg://raguser:ragpass@localhost:5432/ragdb
          DATABASE_URL_SYNC=postgresql://raguser:ragpass@localhost:5432/ragdb
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=ci-test-key
          ENVIRONMENT=ci
          EOF
      - run: pytest -v --timeout=30 || true

  build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
