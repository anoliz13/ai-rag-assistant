version: "3.9"

services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build: ./backend
    restart: always
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    env_file: .env.production
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    env_file: .env.production
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  minio_data:
